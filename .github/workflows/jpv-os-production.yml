name: JPV-OS Production Verification

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-production-build:
    name: Verify JPV-OS Production Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Build OpenNext Cloudflare bundle
        run: npx opennextjs-cloudflare build

      - name: Verify production health endpoint
        run: |
          STATUS=$(curl -s -o /tmp/health.json -w "%{http_code}" https://jaypv-os.jaypventuresllc.com/health.json)
          cat /tmp/health.json
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
